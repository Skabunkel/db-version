---
# _apply_major.yml
# Included by migrate.yml for each major version directory.
# Applies all pending minor migration scripts in a single transaction.

# ── Get current minor version for this major ────────────────────────────
- name: "{{ major_version }} | Get current minor version"
  community.postgresql.postgresql_query:
    db: "{{ db_name }}"
    query: |
      SELECT COALESCE(MAX(minor_version), 0) AS current_minor
      FROM schema_versions
      WHERE major_version = %(major)s;
    named_args:
      major: "{{ major_version }}"
  register: current_version

- name: "{{ major_version }} | Set current minor fact"
  ansible.builtin.set_fact:
    current_minor: "{{ current_version.query_result[0].current_minor | int }}"

# ── Discover migration scripts ──────────────────────────────────────────
- name: "{{ major_version }} | Find migration scripts"
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/{{ version_dir }}/{{ major_version }}"
    patterns: "*.sql"
  register: script_files
  delegate_to: localhost
  become: false

- name: "{{ major_version }} | Sort and filter pending scripts"
  ansible.builtin.set_fact:
    pending_scripts: >-
      {{
        script_files.files
        | map(attribute='path')
        | sort
        | select('match', '.*/' ~ '[0-9]{3}-[0-9]{3}-.*\.sql$')
        | list
      }}

# ── Parse script metadata and filter by current minor ──────────────────
- name: "{{ major_version }} | Build migration list"
  ansible.builtin.set_fact:
    migrations_to_apply: >-
      {{
        pending_scripts
        | map('basename')
        | map('regex_replace', '^(\d{3})-(\d{3})-(.*)\.sql$', '\1|\2|\3')
        | map('split', '|')
        | selectattr('0', 'defined')
        | list
      }}

- name: "{{ major_version }} | Filter to unapplied migrations"
  ansible.builtin.set_fact:
    unapplied: >-
      {{
        migrations_to_apply
        | selectattr('0', 'match', '^0*' ~ (current_minor | string) ~ '$|^0*[' ~ ((current_minor | int) + 1) ~ '-9][0-9]*$')
        | rejectattr('0', 'match', '^0*([0-9]+)$', ignorecase=True)
        | list
      }}

# Simpler approach: just filter scripts where from >= current_minor
- name: "{{ major_version }} | Determine scripts to run"
  ansible.builtin.set_fact:
    scripts_to_run: []

- name: "{{ major_version }} | Collect pending scripts"
  ansible.builtin.set_fact:
    scripts_to_run: "{{ scripts_to_run + [item] }}"
  loop: "{{ pending_scripts }}"
  when: (item | basename | regex_replace('^(\\d{3})-.*', '\\1')) | int >= (current_minor | int)

- name: "{{ major_version }} | Show pending migrations"
  ansible.builtin.debug:
    msg: "Will apply {{ scripts_to_run | length }} migration(s) for {{ major_version }}: {{ scripts_to_run | map('basename') | list }}"

# ── Apply all pending scripts in a single transaction ───────────────────
- name: "{{ major_version }} | Apply migrations"
  when: scripts_to_run | length > 0
  block:
    - name: "{{ major_version }} | Read migration SQL files"
      ansible.builtin.slurp:
        src: "{{ item }}"
      loop: "{{ scripts_to_run }}"
      register: sql_contents
      delegate_to: localhost
      become: false

    - name: "{{ major_version }} | Compute final minor version"
      ansible.builtin.set_fact:
        final_minor: "{{ (scripts_to_run[-1] | basename | regex_replace('^\\d{3}-(\\d{3})-.*', '\\1')) | int }}"

    - name: "{{ major_version }} | Build transaction SQL"
      ansible.builtin.set_fact:
        transaction_sql: |
          BEGIN;
          {% for result in sql_contents.results %}
          -- Migration: {{ result.item | basename }}
          {{ result.content | b64decode }}
          {% endfor %}

          INSERT INTO schema_versions (major_version, minor_version, description)
          VALUES ('{{ major_version }}', {{ final_minor }}, 'Applied migrations up to {{ scripts_to_run[-1] | basename }}');

          COMMIT;

    - name: "{{ major_version }} | Execute transaction"
      community.postgresql.postgresql_query:
        db: "{{ db_name }}"
        autocommit: false
        query: "{{ transaction_sql }}"

    - name: "{{ major_version }} | Migration complete"
      ansible.builtin.debug:
        msg: "{{ major_version }} migrated to minor version {{ final_minor }}"
